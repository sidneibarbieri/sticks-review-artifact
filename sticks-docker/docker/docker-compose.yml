# ============================================================
# STATIC NETWORK CONFIGURATION
# ============================================================
# NETWORK                SUBNET            HOST        IP
# ------------------------------------------------------------
# caldera-kali-network   172.20.0.0/24     caldera    172.20.0.10
# caldera-kali-network   172.20.0.0/24     kali       172.20.0.20
#
# kali-nginx-network     172.21.0.0/24     kali       172.21.0.10
# kali-nginx-network     172.21.0.0/24     nginx      172.21.0.20
#
# nginx-db-network       172.22.0.0/24     nginx      172.22.0.10
# nginx-db-network       172.22.0.0/24     db         172.22.0.20
# ============================================================

services:
  # DATABASE - Only accessible by Nginx
  db:
    build: .docker/db
    container_name: db
    hostname: db
    #restart: always
    tty: true
    ports:
      - "33006:3306"  # External access for debugging ONLY - remove this line for production
    volumes:
      - ./.docker/db/dbdata:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    networks:
      nginx-db-network:
        ipv4_address: 172.22.0.20  # Fixed IP inside 172.22.0.0/24
      local-network: {}  # Default bridge network (no fixed IP asigned)
    dns:
      - 8.8.8.8
    healthcheck:
      test: ["CMD", "true"]
      interval: 30s
      timeout: 10s
      retries: 3

  # NGINX - The gateway/mediator
  nginx:
    build: .docker/nginx
    container_name: nginx
    hostname: nginx
    ports:
      - "8000:80"
      - "8443:443"
    volumes:
      - ./.docker/nginx/var/www/html:/var/www/html
    networks:
      nginx-db-network:
        ipv4_address: 172.22.0.10  # Fixed IP for DB communication
      kali-nginx-network:
        ipv4_address: 172.21.0.20  # Fixed IP for Kali ↔ Nginx communication
      local-network: {}  # Default bridge network (no fixed IP asigned)
    dns:
      - 8.8.8.8
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # CALDERA - Red Team Platform
  caldera:
    build: .docker/caldera
    container_name: caldera
    entrypoint:
      - python3
      - server.py
      - --build
      - --insecure
      - --fresh
    ports:
      - "8888:8888"
    volumes:
      - ./.docker/caldera:/usr/src/app
    environment:
      - TZ=America/New_York
      - CALDERA_SSL=false
    networks:
      caldera-kali-network:
        ipv4_address: 172.20.0.10  # Fixed IP inside Caldera-Kali network
      local-network: {}  # Default bridge network (no fixed IP asigned)
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "true"]
      interval: 30s
      timeout: 10s
      retries: 3

  # KALI LINUX - Penetration Testing
  kali:
    build:
      context: .docker/kali
      dockerfile: Dockerfile
    container_name: kali
    hostname: kali-attacker
    volumes:
      - ./kali-data:/root
    networks:
      caldera-kali-network:
        ipv4_address: 172.20.0.20  # Fixed IP for communication with Caldera
      kali-nginx-network:
        ipv4_address: 172.21.0.10  # Fixed IP for communication with Nginx
      local-network: {}  # Default bridge network (no fixed IP asigned)
    dns:
      - 8.8.8.8
    privileged: true
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
      - NET_RAW
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
    security_opt:
      - seccomp:unconfined
      - apparmor:unconfined
    stdin_open: true
    tty: true
    restart: unless-stopped


# NETWORK CONFIGURATION
# hierarquical configuration: localhost -> caldera -> kali -> nginx -> db

networks:
  # 0. Local Network
  local-network:
    driver: bridge  # Default Docker bridge (external reachable if ports exposed)

  # 1. PRIVATE: Caldera ↔ Kali ONLY
  caldera-kali-network:
    driver: bridge
    internal: true  # No external access
    ipam:
      config:
        - subnet: 172.20.0.0/24  # Custom subnet
          gateway: 172.20.0.1
  # 2. PRIVATE: Kali ↔ Nginx
  kali-nginx-network:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.21.0.0/24  # Custom subnet
          gateway: 172.21.0.1    # Network gateway

  # 3. PRIVATE: Nginx ↔ DB
  nginx-db-network:
    driver: bridge
    internal: true  # No external access
    ipam:
      config:
        - subnet: 172.22.0.0/24  # Custom subnet
          gateway: 172.22.0.1    # Network gateway

